<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Flow - Pro Dashboard</title>
    <style>
        :root { --main: #fe2c55; --secondary: #25f4ee; --bg: #010101; --card: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .app-container { background: var(--card); width: 360px; padding: 25px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        
        .header { margin-bottom: 25px; }
        .logo { width: 50px; height: 50px; background: white; border-radius: 12px; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; }
        
        input { width: 100%; box-sizing: border-box; padding: 15px; background: #222; border: 1px solid #444; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(254, 44, 85, 0.3); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(45deg, var(--main), #ff6b81); color: white; }
        .btn-primary:disabled { background: #444; cursor: not-allowed; }

        #console { background: #000; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px; height: 100px; overflow-y: auto; text-align: left; margin: 15px 0; border: 1px solid #222; color: #0f0; }
        
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 10px; margin: 15px 0; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--secondary); border-radius: 10px; transition: 0.1s; box-shadow: 0 0 10px var(--secondary); }
        
        .counter-box { font-size: 42px; font-weight: 800; color: white; margin: 10px 0; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">🍎</div>
        <h3>TikTok Growth Tool</h3>
        <p style="color: #666; font-size: 13px;">Insira o @ do perfil para otimização</p>
    </div>

    <input type="text" id="user" placeholder="@usuario_tiktok">
    
    <button class="btn btn-primary" id="mainBtn" onclick="processar()">Iniciar Injeção 50K</button>

    <div class="progress-bar" id="barBox"><div class="progress-fill" id="fill"></div></div>
    <div class="counter-box" id="count">0</div>

    <div id="console">Sistema pronto. Aguardando input...</div>

    <p style="font-size: 10px; color: #444;">Versão 4.0.1 - Criptografia SSL Ativa</p>
</div>

<script>
    const logs = [
        "Conectando aos servidores do TikTok...",
        "Buscando banco de dados de usuários...",
        "Proxy estabelecido em Frankfurt, DE.",
        "Localizando @user...",
        "Usuário encontrado! Verificando integridade...",
        "Iniciando bypass de verificação humana...",
        "Injetando pacotes de seguidores (50.000)...",
        "Sincronizando com o servidor principal...",
        "Finalizando processo..."
    ];

    function log(msg, color = "#0f0") {
        const c = document.getElementById('console');
        c.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    async function processar() {
        const user = document.getElementById('user').value;
        if(!user || user.length < 3) return alert("Digite um @ válido");

        document.getElementById('mainBtn').disabled = true;
        document.getElementById('barBox').style.display = 'block';
        
        for(let i=0; i < logs.length; i++) {
            log(logs[i].replace("@user", user));
            await new Promise(r => setTimeout(r, 1200));
            if(i === 6) iniciarContagem();
        }
    }

    function iniciarContagem() {
        const countDiv = document.getElementById('count');
        const fill = document.getElementById('fill');
        countDiv.style.display = 'block';
        let n = 0;
        let int = setInterval(() => {
            n += 431;
            countDiv.innerText = n.toLocaleString();
            fill.style.width = (n / 50000 * 100) + "%";
            if(n >= 50000) {
                clearInterval(int);
                countDiv.innerText = "50,000";
                countDiv.style.color = "#25f4ee";
                log("PROCESSO CONCLUÍDO COM SUCESSO!", "#fe2c55");
                alert("Atenção: Esta é uma simulação avançada para fins de demonstração de interface (UI/UX).");
            }
        }, 30);
    }
</script>

</body>
</html>
